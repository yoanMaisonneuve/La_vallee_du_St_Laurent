<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Engine — WebGL2 / WebGPU-Ready</title>

  <!-- ================================================================
       IMPORT MAP — Three.js r165 via esm.sh (ES modules, no bundler)
       All addon paths resolve through the same CDN so version is pinned.
       ================================================================ -->
  <script type="importmap">
  {
    "imports": {
      "three":                        "https://esm.sh/three@0.165.0",
      "three/addons/":                "https://esm.sh/three@0.165.0/examples/jsm/",
      "three/src/":                   "https://esm.sh/three@0.165.0/src/"
    }
  }
  </script>

  <style>
    /* ── Reset & fullscreen canvas ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0a0f;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
      touch-action: none; /* disable browser touch scroll so we handle it */
    }

    /* ── Loading overlay ────────────────────────────────────────────── */
    #loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      color: #e0e0e0;
      transition: opacity 0.6s ease;
    }
    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #loading-bar-wrap {
      width: 260px;
      height: 3px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      margin-top: 16px;
      overflow: hidden;
    }
    #loading-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #5b8dee, #a78bfa);
      border-radius: 2px;
      transition: width 0.2s ease;
    }
    #loading-label {
      margin-top: 10px;
      font-size: 12px;
      letter-spacing: 0.08em;
      opacity: 0.6;
    }

    /* ── HUD / debug UI ─────────────────────────────────────────────── */
    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 50;
      pointer-events: none;
    }
    #profiler-panel {
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 8px 12px;
      color: #c8ffc8;
      font-size: 11px;
      font-family: 'Fira Code', 'Cascadia Code', monospace;
      line-height: 1.6;
      min-width: 140px;
    }

    /* ── Info badge (bottom-right) ──────────────────────────────────── */
    #info {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 50;
      color: rgba(255,255,255,0.35);
      font-size: 11px;
      text-align: right;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- Loading screen -->
  <div id="loading-overlay">
    <div style="font-size:14px;letter-spacing:0.12em;opacity:0.9">LOADING SCENE</div>
    <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
    <div id="loading-label">Initialising renderer…</div>
  </div>

  <!-- WebGL canvas mount point -->
  <div id="canvas-container"></div>

  <!-- HUD / Profiler display (populated by Profiler.js) -->
  <div id="hud">
    <div id="profiler-panel">
      <div>FPS  <span id="stat-fps">—</span></div>
      <div>MS   <span id="stat-ms">—</span></div>
      <div>MEM  <span id="stat-mem">—</span></div>
      <div>DRAW <span id="stat-draw">—</span></div>
    </div>
  </div>

  <!-- Scene info badge -->
  <div id="info">
    Three.js WebGL2 Engine &nbsp;|&nbsp; Orbit to navigate &nbsp;|&nbsp; Click to select
  </div>

  <!-- ================================================================
       Bootstrap — ES module entry point
       type="module" means deferred by default; import map is resolved
       before the script is evaluated.
       ================================================================ -->
  <script type="module" src="main.js"></script>

</body>
</html>
